function wxEmoji(c){if(c<=0)return"\u2600\uFE0F";if(c<=3)return"\u26C5";if(c<=48)return"\uD83C\uDF2B\uFE0F";if(c<=67)return"\uD83C\uDF27\uFE0F";if(c<=77)return"\u2744\uFE0F";if(c<=82)return"\uD83C\uDF26\uFE0F";return"\u26C8\uFE0F"}
async function fetchDestWeather(flights){
  for(const f of flights){
    try{
      const c=COORDS[f.dn];if(!c)continue;
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c[0]}&longitude=${c[1]}&current_weather=true&temperature_unit=fahrenheit`);
      const d=await r.json();
      if(d.current_weather){f.wx=Math.round(d.current_weather.temperature)+"\u00B0F";f.wxCode=d.current_weather.weathercode;f.wxIcon=wxEmoji(d.current_weather.weathercode)}
    }catch(e){}
  }
}

async function init(){
  const app=document.getElementById("app");
  app.innerHTML=`<div class="hdr"><div class="sub">LOADING FLIGHTS</div><h1>Where To?</h1><div class="date">${dateStr.toUpperCase()}</div></div><div style="text-align:center;padding:40px;color:#6b7280;font-family:var(--mono);font-size:11px;letter-spacing:2px">CHECKING TODAY'S DEPARTURES\u2026</div>`;
  todayFlights=await fetchLiveFlights();
