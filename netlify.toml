<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Where To? — Daily Aviation Puzzle</title>
<meta name="description" content="Three boarding passes. Three mysteries. Guess the destination.">
<meta name="theme-color" content="#0e0d17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e0d17;--card:#faf6ee;--card2:#e8e2d4;--red:#c41e3a;--gold:#e8c55a;--ink:#1e1b4b;--mute:#4a4458;--txt:#c8cad0;--dim:#2d2b3a;--mono:'DM Mono',monospace;--serif:'Instrument Serif',Georgia,serif}
html{height:100%;overflow-y:scroll}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);min-height:100%;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto;padding:16px 14px;padding-bottom:80px}
.hdr{text-align:center;margin-bottom:16px}
.hdr .sub{font-size:8px;letter-spacing:5px;color:var(--mute);margin-bottom:4px}
.hdr h1{font-size:30px;font-weight:400;color:var(--gold);letter-spacing:1px;font-family:var(--serif)}
.hdr .date{font-size:8px;color:var(--dim);letter-spacing:3px;margin-top:3px}
.round-nav{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.round-pill{padding:5px 12px;border-radius:20px;font-size:8px;letter-spacing:2px;font-weight:700;border:1px solid rgba(42,39,66,.3);color:#4a4458;background:rgba(17,16,25,.3)}
.round-pill.active{color:var(--gold);border-color:rgba(232,197,90,.3);background:rgba(232,197,90,.06)}
.round-pill.done{color:#15803d;border-color:rgba(21,128,61,.3);background:rgba(21,128,61,.06)}
.round-pill.failed{color:#ef4444;border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.diff-badge{display:inline-block;font-size:7px;letter-spacing:2px;font-weight:700;padding:3px 10px;border-radius:4px;margin-bottom:10px}
.diff-easy{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.diff-medium{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.diff-hard{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.pass{background:linear-gradient(160deg,#faf6ee,#f0ebe0 40%,var(--card2));border-radius:12px;overflow:hidden;box-shadow:0 8px 36px rgba(0,0,0,.4);position:relative;margin-bottom:16px;transform:rotate(-0.3deg)}
.stripe{height:4px;background:linear-gradient(90deg,var(--red),#a01830,var(--red))}
.top-row{padding:8px 14px 6px;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #d8d0c2}
.lbl{font-size:6.5px;color:#a39382;letter-spacing:1.5px;font-weight:700;margin-bottom:1px}
.val{font-size:13px;font-weight:900;color:var(--ink);letter-spacing:.5px}
.val-big{font-size:26px;font-weight:900;color:var(--ink);line-height:1;letter-spacing:-1px}
.val-city{font-size:7px;color:#7a6f60;margin-top:1px}
.route{padding:10px 14px 8px;display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.route-mid{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 4px}
.route-mid .dt{font-size:6.5px;color:#b0a590}
.route-line{width:40px;display:flex;align-items:center}
.route-line span{flex:1;height:1px;background:#c8bfb0}
.route-line .plane{font-size:11px;color:#8a7e6e;margin:0 2px}
.dest-q{font-size:24px;font-weight:900;color:var(--red);letter-spacing:2px;line-height:1;text-align:right}
.dest-hint{font-size:7px;color:var(--red);margin-top:1px;font-style:italic;text-align:right}
.tear{position:relative;margin:0 8px}
.tear-line{border-top:2px dashed #c8bfb0}
.tear-hole{position:absolute;top:-8px;width:16px;height:16px;border-radius:50%;background:var(--bg)}
.tear-l{left:-14px}.tear-r{right:-14px}
.fields{padding:8px 14px 6px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.fields2{padding:3px 14px 6px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.field-hidden{height:14px;width:50px;border-radius:3px;background:linear-gradient(90deg,#d4d0c8,#c8c3b8,#d4d0c8)}
.field-val{font-size:13px;font-weight:900;color:var(--ink);line-height:1;letter-spacing:.5px}
.barcode-row{padding:4px 14px 10px;display:flex;justify-content:space-between;align-items:flex-end}
.barcode{display:flex;align-items:flex-end;height:26px;opacity:.18}
.barcode div{background:var(--ink);margin-right:1px}
.bc-info{font-size:5px;color:#b0a590;text-align:right;line-height:1.4;letter-spacing:1px}
.stamp{position:absolute;top:30%;right:20px;border:3px solid;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:900;letter-spacing:3px;transform:rotate(-12deg);background:rgba(250,246,238,.88);animation:stampIn .35s ease-out;pointer-events:none}
.stamp-won{color:#15803d;border-color:#15803d}.stamp-lost{color:var(--red);border-color:var(--red)}
@keyframes stampIn{0%{transform:rotate(-12deg) scale(1.6);opacity:0}60%{transform:rotate(-12deg) scale(.95)}100%{transform:rotate(-12deg) scale(1)}}
.section-label{font-size:7px;letter-spacing:3px;color:#3d3f52;margin-bottom:5px;padding-left:3px;font-weight:600}
.guess-row{display:flex;align-items:center;gap:6px;padding:7px 10px;margin-bottom:3px;border-radius:7px;border:1px solid}
.guess-num{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.guess-text{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guess-miles{font-size:10px;font-weight:700;flex-shrink:0;text-align:right;min-width:55px}
.input-row{display:flex;gap:6px}
.input-wrap{flex:1;position:relative}
.city-input{width:100%;padding:12px 14px;background:rgba(17,16,25,.8);border:1px solid #2a2742;border-radius:8px;color:#e2e8f0;font-size:16px;font-family:var(--mono);outline:none}
.city-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(232,197,90,.1)}
.guess-btn{padding:12px 16px;border-radius:8px;border:none;cursor:pointer;font-family:var(--mono);font-weight:900;font-size:11px;letter-spacing:1px;min-width:70px}
.guess-btn.active{background:linear-gradient(135deg,var(--gold),#c9a832);color:var(--ink)}
.guess-btn.disabled{background:rgba(30,28,50,.6);color:#3d3f52;cursor:default}
.dropdown{position:absolute;top:100%;left:0;right:0;background:#1a1828;border:1px solid #2a2742;border-radius:8px;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:100;overflow:hidden;max-height:220px;overflow-y:auto;display:none}
.dropdown.show{display:block}
.dd-item{padding:12px 14px;cursor:pointer;font-size:13px;color:#9ca3af;border-bottom:1px solid rgba(30,28,50,.8)}
.dd-item:hover,.dd-item.sel{background:rgba(232,197,90,.06);color:var(--gold)}
.progress{display:flex;gap:3px}
.progress div{width:12px;height:4px;border-radius:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#16141f;border:1px solid rgba(42,39,66,.4);border-radius:16px;width:100%;max-width:400px;overflow:hidden;animation:slideUp .3s ease-out;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-top{padding:24px 20px 14px;text-align:center}
.modal-top .emoji{font-size:40px;margin-bottom:6px}
.modal-top .title{font-size:22px;font-family:var(--serif);margin-bottom:4px}
.modal-top .subtitle{font-size:11px;color:#6b7280}
.modal-route{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;background:rgba(232,197,90,.04);border-top:1px solid rgba(42,39,66,.2);border-bottom:1px solid rgba(42,39,66,.2)}
.modal-route .code{font-size:24px;font-weight:900;color:#fff}
.modal-route .city{font-size:8px;color:#6b7280;margin-top:1px}
.modal-route .arrow{font-size:16px;color:var(--gold)}
.modal-map{height:240px;width:100%;background:#0b1120}
.modal-ac{padding:12px 20px;text-align:center;border-bottom:1px solid rgba(42,39,66,.2)}
.modal-ac .ac-lbl{font-size:7px;letter-spacing:2px;color:var(--mute);margin-bottom:2px}
.modal-ac .ac-name{font-size:15px;font-weight:900;color:var(--gold)}
.modal-ac .ac-detail{font-size:8px;color:var(--mute);margin-top:1px}
.modal-score{padding:12px 20px;text-align:center}
.modal-score .sc{font-size:13px;font-weight:700}
.modal-btn{display:block;width:calc(100% - 40px);margin:0 20px 20px;padding:14px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#c9a832);color:var(--ink);border:none;cursor:pointer;font-family:var(--mono);font-weight:900;font-size:13px;letter-spacing:1px}
.modal-btn:active{filter:brightness(.9)}
.final{text-align:center;padding:20px 16px}
.final h2{font-size:26px;font-family:var(--serif);color:var(--gold);margin-bottom:4px}
.final .score-big{font-size:44px;font-weight:900;color:#fff;margin:10px 0 2px;font-family:var(--serif)}
.final .score-unit{font-size:10px;color:#6b7280;letter-spacing:2px}
.final .breakdown{margin:16px auto;max-width:320px}
.final .bk-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,39,66,.2)}
.final .bk-label{font-size:10px;color:#9ca3af}
.final .bk-val{font-size:12px;font-weight:700}
.share-btn{margin-top:14px;padding:12px 28px;border-radius:8px;border:none;cursor:pointer;font-family:var(--mono);font-weight:900;font-size:11px;letter-spacing:1.5px;background:linear-gradient(135deg,var(--gold),#c9a832);color:var(--ink)}
.share-btn.copied{background:#15803d;color:#fff}
.howto{padding:12px 14px;background:rgba(17,16,25,.5);border:1px solid rgba(42,39,66,.3);border-radius:10px}
.howto .htlbl{font-size:7px;letter-spacing:3px;color:#3d3f52;margin-bottom:6px;font-weight:700}
.howto p{font-size:10px;color:#6b7280;line-height:1.8}
.howto .hl{color:var(--gold);font-weight:700}
.hints-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.hint-pill{font-size:6.5px;padding:2px 6px;border-radius:4px;background:rgba(30,28,50,.5);border:1px solid rgba(42,39,66,.3);color:var(--mute);font-weight:600;letter-spacing:1px}
.info-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(42,39,66,.4);border:1px solid rgba(42,39,66,.6);color:var(--mute);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--serif)}
.info-btn:hover{background:rgba(42,39,66,.7);color:var(--gold)}
.dbg-btn{position:fixed;bottom:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(42,39,66,.5);border:1px solid rgba(42,39,66,.6);color:var(--mute);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);z-index:200}
.dbg-panel{position:fixed;bottom:48px;right:10px;background:#1a1828;border:1px solid rgba(42,39,66,.6);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:9px;color:#6b7280;max-width:300px;z-index:200;display:none;line-height:1.6}
.dbg-panel.show{display:block}
.footer{text-align:center;margin-top:20px;padding-bottom:12px;font-size:7px;color:#1e1e2e;letter-spacing:3px;font-weight:600}
</style>
</head>
