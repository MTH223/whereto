    <div class="round-nav">${rounds.map((r,i)=>{let c="round-pill";if(i===curRound)c+=" active";else if(r.gameOver)c+=r.won?" done":" failed";return`<div class="${c}">${TIER_LABELS[i]}</div>`}).join("")}</div>
    <div style="text-align:center"><div class="diff-badge ${TIER_CSS[curRound]}">ROUND ${curRound+1} \u2022 ${TIER_LABELS[curRound]}</div></div>`;

  html+=`<div class="pass"><div class="stripe"></div>
    <div class="top-row"><div><div class="lbl">AIRLINE</div><div class="val">${f.al.toUpperCase()}</div></div>
    <div style="text-align:right"><div class="lbl">FLIGHT</div><div class="val">${f.fn}</div></div></div>
    <div class="route">
      <div><div class="lbl">FROM</div><div class="val-big">${f.oc}</div><div class="val-city">${f.on}</div></div>
