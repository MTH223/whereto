function resolveCity(input){const q=input.trim();if(!q)return null;const ql=q.toLowerCase();const exact=ALL_CITIES.find(c=>c.toLowerCase()===ql);if(exact)return exact;const upper=q.toUpperCase();if(CODE2CITY[upper])return CODE2CITY[upper];return null}
function searchCities(q){if(!q)return[];const ql=q.toLowerCase(),qu=q.toUpperCase();const results=[];Object.keys(CODE2CITY).forEach(code=>{if(code.includes(qu)){const city=CODE2CITY[code];if(!results.find(r=>r.city===city))results.push({city,code})}});ALL_CITIES.forEach(c=>{if(c.toLowerCase().includes(ql)&&!results.find(r=>r.city===c))results.push({city:c,code:CITY2CODES[c]||""})});return results.slice(0,8)}
function boardingGroup(seat){const row=parseInt(seat);if(row<=20)return"GROUP 1";if(row<=28)return"GROUP 2";if(row<=36)return"GROUP 3";if(row<=48)return"GROUP 4";return"GROUP 5"}

// Hints: 1=aircraft, 2=dep+arr, 3=tz, 4=continent
function hintOn(k,rd){
  const n=rd.guesses.length;
  if(rd.gameOver)return true;
  if(k==="ac")return n>=1;
  if(k==="dep"||k==="arr")return n>=2;
  if(k==="tz")return n>=3;
  if(k==="cont")return n>=4;
  return false;
}

