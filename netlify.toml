    </div>
    <div class="tear"><div class="tear-line"></div><div class="tear-hole tear-l"></div><div class="tear-hole tear-r"></div></div>
    <div style="padding:8px 14px 2px"><div class="lbl">AIRCRAFT</div>${hintOn("ac",rd)?`<div class="field-val">${f.ac}</div>`:`<div class="field-hidden"></div>`}</div>
    <div class="fields">${fieldHTML("DEPARTS",f.dep,hintOn("dep",rd))}${fieldHTML("ARRIVES",f.arr,hintOn("arr",rd))}${fieldHTML("TZ CHANGE",f.tz,hintOn("tz",rd))}${fieldHTML("CONTINENT",cont,hintOn("cont",rd))}</div>
    <div class="fields2">${fieldHTML("SEAT",f.s,true)}${fieldHTML("CLASS","ECONOMY",true)}${fieldHTML("BOARDING",boardingGroup(f.s),true)}${fieldHTML("DEST. WEATHER",f.wx?(f.wxIcon+" "+f.wx):"--",true)}</div>
    <div class="barcode-row"><div class="barcode">${makeBarcode(dateSeed(td)+curRound)}</div><div class="bc-info">BOARDING PASS<br>${f.fn}<br>E-TICKET</div></div>
    ${rd.gameOver?`<div class="stamp ${rd.won?"stamp-won":"stamp-lost"}">${rd.won?"FOUND":"MISSED"}</div>`:""}
  </div>`;

  if(rd.guesses.length>0){
    html+=`<div style="margin-bottom:14px"><div class="section-label">GUESSES</div>`;
    rd.guesses.forEach((g,i)=>{
      const c=isCorrect(g,f),mi=c?0:distMi(g,f.dn),gc=CITY2CODES[g]||"";
      let hint,hc;
      if(c){hint="\u2713";hc="#4ade80"}
      else if(i<3){
        // Temperature scale based on absolute distance
        if(mi<200){hint="SCORCHING";hc="#ef4444"}
        else if(mi<500){hint="HOT";hc="#f97316"}
        else if(mi<1500){hint="WARM";hc="#eab308"}
        else if(mi<3500){hint="COOL";hc="#94a3b8"}
        else if(mi<6000){hint="COLD";hc="#60a5fa"}
        else{hint="FREEZING";hc="#3b82f6"}
      }
      else{
        const plane=dirPlane(g,f.dn);
        hint=plane+" "+mi.toLocaleString()+" mi";hc=milesColor(mi);
      }
      const bg=c?"rgba(21,128,61,.1)":"rgba(100,116,139,.04)";
      const bd=c?"rgba(21,128,61,.25)":"rgba(61,63,82,.15)";
      html+=`<div class="guess-row" style="background:${bg};border-color:${bd}">
        <div class="guess-num" style="background:${c?"#15803d":"#3d3f52"}">${c?"\u2713":i+1}</div>
        <span class="guess-text" style="color:${c?"#4ade80":"#9ca3af"}">${g}${gc?` <span style="color:#4a4458;font-size:9px">${gc}</span>`:""}</span>
        <span class="guess-miles" style="color:${hc}">${hint}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if(!rd.gameOver){
    const pips=Array.from({length:MAX}).map((_,i)=>{const col=i<rd.guesses.length?(isCorrect(rd.guesses[i],f)?"#15803d":"#3d3f52"):i===rd.guesses.length?"#e8c55a":"#1e1e2e";return`<div style="background:${col}"></div>`}).join("");
    html+=`<div style="position:relative;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;padding:0 3px">
        <span class="section-label" style="margin:0;padding:0">GUESS ${rd.guesses.length+1} OF ${MAX}</span>
        <div class="progress">${pips}</div>
      </div>
      <div class="input-row"><div class="input-wrap">
        <input class="city-input" id="cityInput" type="text" placeholder="City name or airport code\u2026" autocomplete="off" enterkeyhint="go">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <button class="guess-btn disabled" id="guessBtn">GUESS</button></div>
    </div>`;
  }

  if(showInfo||(curRound===0&&rd.guesses.length===0&&!rd.gameOver)){
    html+=`<div class="howto"><div class="htlbl">HOW TO PLAY</div>
      <p>You found 3 boarding passes \u2014 <span class="hl">Easy</span>, <span class="hl">Medium</span>, and <span class="hl">Hard</span>. Guess each destination in 5 tries. After each wrong guess, a plane icon points toward the answer. Your 4th guess also reveals exact mileage. Each wrong guess reveals a new hint on the pass.</p>
      <div class="hints-list">${["Aircraft","Dep + Arr Time","TZ Change","Continent + Miles"].map((h,i)=>`<div class="hint-pill">${i+1}. ${h}</div>`).join("")}</div>
      <div style="margin-top:8px"><div class="htlbl">SCORING</div>
      <p>Earn frequent flyer miles for each correct guess. Earlier = more miles! Harder rounds earn more.</p>
      <div class="hints-list">${["1st: 1,000","2nd: 750","3rd: 500","4th: 250","5th: 100"].map(h=>`<div class="hint-pill">${h}</div>`).join("")}</div>
      <div class="hints-list" style="margin-top:4px">${["Easy: 1x","Medium: 2x","Hard: 3x"].map(h=>`<div class="hint-pill">${h}</div>`).join("")}</div></div>
    </div>`;
  }
  html+=`<div class="footer">THREE NEW PASSES DAILY AT MIDNIGHT</div>`;
  app.innerHTML=html;
  bindEvents();
  const ib=document.getElementById("infoBtn");
  if(ib)ib.addEventListener("click",()=>{showInfo=!showInfo;render()});
}

function renderFinal(){
  const app=document.getElementById("app");
  const total=rounds.reduce((s,r)=>s+r.score,0);
  let grade,gc;
  if(total===6000){grade="PERFECT \u{1F3C6}";gc="#e8c55a"}
  else if(total>=5000){grade="EXCELLENT";gc="#4ade80"}
  else if(total>=4000){grade="GREAT";gc="#4ade80"}
  else if(total>=2500){grade="GOOD";gc="#fbbf24"}
  else if(total>=1000){grade="NOT BAD";gc="#f97316"}
  else{grade="KEEP TRYING";gc="#ef4444"}
  app.innerHTML=`<div class="hdr"><div class="sub">DAILY RESULTS</div><h1>Where To?</h1><div class="date">${dateStr.toUpperCase()}</div></div>
  <div class="final">
    <div style="font-size:9px;letter-spacing:3px;color:${gc};margin-bottom:4px">${grade}</div>
    <div class="score-big">${total.toLocaleString()}</div>
    <div class="score-unit">MILES EARNED</div>
    <div class="breakdown">${rounds.map((r,i)=>{const f=r.flight;return`<div class="bk-row"><div><span class="bk-label">${TIER_LABELS[i]}</span> <span style="font-size:8px;color:#4a4458">${f.oc}\u2192${f.dc}</span></div><div class="bk-val" style="color:${r.won?"#4ade80":"#f87171"}">+${r.score.toLocaleString()} mi</div></div>`}).join("")}</div>
    <button class="share-btn" id="shareBtn">SHARE RESULTS</button>
  </div>
  <div class="footer">THREE NEW PASSES DAILY AT MIDNIGHT</div>`;
  document.getElementById("shareBtn").addEventListener("click",doShare);
}

function bindEvents(){
  const inp=document.getElementById("cityInput"),btn=document.getElementById("guessBtn"),dd=document.getElementById("dropdown");
  if(!inp)return;
  inp.addEventListener("input",()=>{
    const q=inp.value.trim().toLowerCase();
    const resolved=resolveCity(inp.value);
    btn.className=resolved?"guess-btn active":"guess-btn disabled";
    if(!q){dd.classList.remove("show");return}
    const matches=searchCities(q);
    if(matches.length){
      dd.innerHTML=matches.map((m,i)=>`<div class="dd-item${i===selIdx?" sel":""}" data-city="${m.city}">${m.city}${m.code?` <span style="color:#4a4458;font-size:10px">${m.code}</span>`:""}</div>`).join("");
      dd.classList.add("show");
      dd.querySelectorAll(".dd-item").forEach(el=>{el.addEventListener("mousedown",e=>{e.preventDefault();doGuess(el.dataset.city)})});
    }else dd.classList.remove("show");
  });
  inp.addEventListener("keydown",e=>{
    const items=dd.querySelectorAll(".dd-item");
    if(e.key==="ArrowDown"){e.preventDefault();selIdx=Math.min(selIdx+1,items.length-1);items.forEach((el,i)=>{el.className=i===selIdx?"dd-item sel":"dd-item"})}
    else if(e.key==="ArrowUp"){e.preventDefault();selIdx=Math.max(selIdx-1,-1);items.forEach((el,i)=>{el.className=i===selIdx?"dd-item sel":"dd-item"})}
    else if(e.key==="Enter"){e.preventDefault();if(selIdx>=0&&items[selIdx])doGuess(items[selIdx].dataset.city);else{const r=resolveCity(inp.value);if(r)doGuess(r);else if(items.length>0)doGuess(items[0].dataset.city)}}
    else if(e.key==="Escape")dd.classList.remove("show");
  });
  inp.addEventListener("focus",()=>{if(inp.value.trim())inp.dispatchEvent(new Event("input"));setTimeout(()=>{inp.scrollIntoView({behavior:"smooth",block:"center"})},300)});
  inp.addEventListener("blur",()=>setTimeout(()=>dd.classList.remove("show"),200));
  btn.addEventListener("click",()=>{const r=resolveCity(inp.value);if(r)doGuess(r)});
  setTimeout(()=>inp.focus(),100);
}

const MILES_EARNED=[1000,750,500,250,100];
const ROUND_MULTI=[1,2,3];

function doGuess(city){
  const rd=rounds[curRound],f=rd.flight;
  if(rd.gameOver||modalShowing)return;
  rd.guesses.push(city);selIdx=-1;
  if(isCorrect(city,f)){rd.won=true;rd.gameOver=true;rd.score=MILES_EARNED[rd.guesses.length-1]*ROUND_MULTI[curRound]}
  else if(rd.guesses.length>=MAX){rd.gameOver=true;rd.score=0}
  render();
  if(rd.gameOver)setTimeout(()=>showModal(rd,curRound),600);
}

function doShare(){
  const total=rounds.reduce((s,r)=>s+r.score,0);
  const emojis=rounds.map(r=>{
    const sq=r.guesses.map((g,i)=>{
      if(isCorrect(g,r.flight))return"\u{1F7E9}";
      const mi=distMi(g,r.flight.dn);
      if(mi<500)return"\u{1F7E5}";
      if(mi<1500)return"\u{1F7E7}";
      if(mi<3500)return"\u2B1C";
      return"\u{1F7E6}";
    });
    const emp=Array(MAX-r.guesses.length).fill("\u2B1C");return[...sq,...emp].join("")});
  const txt=`\u{1F30D} Where To? \u2014 ${dateStr}\nScore: ${total.toLocaleString()} mi earned\n\n${TIER_LABELS.map((t,i)=>`${t}: ${emojis[i]} +${rounds[i].score}mi`).join("\n")}`;
  navigator.clipboard?.writeText(txt).then(()=>{const b=document.getElementById("shareBtn");b.textContent="COPIED \u2713";b.classList.add("copied");setTimeout(()=>{b.textContent="SHARE RESULTS";b.classList.remove("copied")},2200)});
}
document.getElementById("dbgBtn").addEventListener("click",()=>{
  const p=document.getElementById("dbgPanel");
  p.classList.toggle("show");
  p.innerHTML=_dbg.length?_dbg.map(m=>`<div>${m}</div>`).join(""):"<div>No messages</div>";
});
init();

</script>
</body>
</html>