  modalShowing=true;
  const f=rd.flight,mr=document.getElementById("modalRoot");
  const isLast=roundIdx>=2;
  const cont=getContinent(f.dn);
  mr.innerHTML=`<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-top">
        <div class="emoji">${rd.won?"\u{1F389}":"\u{1F614}"}</div>
        <div class="title" style="color:${rd.won?"#4ade80":"#f87171"}">${rd.won?"Destination Found!":"Not Quite\u2026"}</div>
        <div class="subtitle">${rd.won?`Nailed it in ${rd.guesses.length} guess${rd.guesses.length>1?"es":""}!`:`The answer was <strong>${f.dn}</strong>`}</div>
      </div>
      <div class="modal-route">
        <div style="text-align:center"><div class="code">${f.oc}</div><div class="city">${f.on}</div></div>
        <div class="arrow">\u2708</div>
        <div style="text-align:center"><div class="code" style="color:${rd.won?"#4ade80":"var(--gold)"}">${f.dc}</div><div class="city">${f.dn}</div></div>
      </div>
