function getContinent(city){
  if(CONTINENT_MAP[city])return CONTINENT_MAP[city];
  const c=COORDS[city];if(!c)return"Unknown";
  const lat=c[0],lng=c[1];
  if(lng<-25&&lat>15)return"North America";
  if(lng<-25&&lat>-5)return"Central America";
  if(lng<-25)return"South America";
  if(lat>35&&lng>=-25&&lng<45)return"Europe";
  if(lat>45&&lng>=45&&lng<60)return"Europe";
  if(lat<36&&lat>-40&&lng>=-20&&lng<52)return"Africa";
  if(lat>=10&&lng>=25&&lng<70)return"Middle East";
  if(lng>=60||lng<-150)return lat<-10?"Oceania":"Asia";
  return"Unknown";
}

function seededRandom(s){s=((s>>>0)*2654435761)>>>0;s=((s^(s>>16))*2246822507)>>>0;s=((s^(s>>13))*3266489909)>>>0;s=(s^(s>>16))>>>0;s=(s%2147483646)+1;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
function dateSeed(d){return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate()}
