function haversine(a,b){const R=6371,r=x=>x*Math.PI/180,dL=r(b[0]-a[0]),dN=r(b[1]-a[1]),x=Math.sin(dL/2)**2+Math.cos(r(a[0]))*Math.cos(r(b[0]))*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function calcBearing(from,to){const fc=COORDS[from],tc=COORDS[to];if(!fc||!tc)return 0;const r=x=>x*Math.PI/180;const la1=r(fc[0]),la2=r(tc[0]),dLn=r(tc[1]-fc[1]);const y=Math.sin(dLn)*Math.cos(la2);const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLn);return(Math.atan2(y,x)*180/Math.PI+360)%360}
function dirPlane(from,to){const b=Math.round(calcBearing(from,to));return`<span style="display:inline-flex;align-items:center;gap:4px"><svg width="22" height="22" viewBox="0 0 200 200" style="transform:rotate(${b}deg);flex-shrink:0"><path d="M100 8Q105 8 106 25L107 65 175 92Q180 94 180 97Q180 100 175 101L107 108 108 150 138 170Q140 172 139 175L100 165 61 175Q60 172 62 170L92 150 93 108 25 101Q20 100 20 97Q20 94 25 92L93 65 94 25Q95 8 100 8Z" fill="currentColor"/><ellipse cx="68" cy="88" rx="4" ry="10" fill="currentColor"/><ellipse cx="132" cy="88" rx="4" ry="10" fill="currentColor"/></svg></span>`}
function distMi(a,b){const ca=COORDS[a],cb=COORDS[b];if(!ca||!cb)return 99999;return Math.round(haversine(ca,cb)*0.6214)}

function milesColor(mi){if(mi<250)return"#ef4444";if(mi<750)return"#f97316";if(mi<2000)return"#eab308";if(mi<5000)return"#a3a3a3";if(mi<8000)return"#60a5fa";return"#3b82f6"}

