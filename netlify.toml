    if(cached){const p=JSON.parse(cached);if(p&&p.length===3){_dbg.push("Cached: loaded today's flights");return p}}
  }catch(e){}
  const r2=seededRandom(dateSeed(td)+42);
  try{
  const resp=await fetch("/api/flights");
  if(!resp.ok)throw new Error("API "+resp.status);
  const data=await resp.json();
  const hubs=data.hubs||[];
  const allFlights=data.flights||{};
  const tiers=["easy","medium","hard"];
  const transformed=[];
  for(let round=0;round<3;round++){
    const hub=hubs[round];
    const raw=allFlights[hub]||[];
    const valid=raw.filter(f=>f.arr_iata&&CODE2CITY[f.arr_iata]);
    const withAC=valid.filter(f=>f.aircraft_icao&&AIRCRAFT_NAMES[f.aircraft_icao]);
    const pool=withAC.length>=3?withAC:valid;
    const tierPool=pool.filter(f=>classifyByCode(f.arr_iata)===tiers[round]);
    const anyPool=tierPool.length?tierPool:pool;
    if(!anyPool.length)throw new Error("No flights from "+hub);
    const picked=anyPool[Math.floor(r2()*anyPool.length)];
    _dbg.push("R"+(round+1)+": "+hub+" | pool:"+pool.length+" | ac:"+withAC.length+" | tier:"+tiers[round]);
    transformed.push(transformApiFlight(picked));
  }
  try{localStorage.setItem(cacheKey,JSON.stringify(transformed))}catch(e){}
  return transformed;
  }catch(e){
    _dbg.push("API: "+e.message+", using fallback");
    return fallbackFlights();
  }
}

let curRound=0,modalShowing=false,showInfo=false;
