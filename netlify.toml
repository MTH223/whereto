}
function isCorrect(g,f){return g.toLowerCase()===f.dn.toLowerCase()||g.toLowerCase()===f.dc.toLowerCase()}
function makeBarcode(seed){let s=seed||1;const n=()=>{s=(s*1103515245+12345)&0x7fffffff;return s};let h="";for(let i=0;i<45;i++){const w=n()%3===0?2:1;const ht=16+(n()%12);h+=`<div style="width:${w}px;height:${ht}px"></div>`}return h}
function fieldHTML(l,v,r){return`<div><div class="lbl">${l}</div>${r?`<div class="field-val">${v}</div>`:`<div class="field-hidden"></div>`}</div>`}

// Pre-rendered world map (equirectangular, 2400x1200, base64 PNG)
const MAP_IMG_SRC="data:image/png;base64,";
const _mapImg=new Image();_mapImg.src=MAP_IMG_SRC;
const MAP_W=2400,MAP_H=1200;

function drawMap(canvas,oc,dc){
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||2;
  const W=canvas.width,H=canvas.height;
  ctx.setTransform(1,0,0,1,0,0);
  const ocC=COORDS[oc],dcC=COORDS[dc];
  if(!ocC||!dcC)return;
  ctx.fillStyle="#0b1120";ctx.fillRect(0,0,W,H);
  // Get coordinates and detect antimeridian crossing
  let oLat=ocC[0],oLng=ocC[1],dLat=dcC[0],dLng=dcC[1];
  const crossAM=Math.abs(oLng-dLng)>180;
  if(crossAM){if(oLng<dLng)oLng+=360;else dLng+=360}
  // Calculate view bounds (using adjusted longs for antimeridian routes)
  const minLat=Math.min(oLat,dLat),maxLat=Math.max(oLat,dLat);
  const minLng=Math.min(oLng,dLng),maxLng=Math.max(oLng,dLng);
  const latSpan=Math.max(maxLat-minLat,35),lngSpan=Math.max(maxLng-minLng,50);
  const pad=2.4;
  const cLat=(minLat+maxLat)/2,cLng=(minLng+maxLng)/2;
  const vLat=latSpan*pad,vLng=lngSpan*pad;
  const mapAspect=W/H,spanAspect=vLng/(vLat||1);
  let fLat=vLat,fLng=vLng;
  if(spanAspect>mapAspect){fLat=vLng/mapAspect}else{fLng=vLat*mapAspect}
  // Draw map image with wrapping support
  if(_mapImg.complete){
    let imgCLng=cLng;
    while(imgCLng>180)imgCLng-=360;
    while(imgCLng<-180)imgCLng+=360;
    const srcX=((imgCLng-fLng/2)+180)/360*MAP_W;
    const srcY=(90-(cLat+fLat/2))/180*MAP_H;
    const srcW=fLng/360*MAP_W;
    const srcH=fLat/180*MAP_H;
    if(srcX>=0&&srcX+srcW<=MAP_W){
      ctx.drawImage(_mapImg,srcX,srcY,srcW,srcH,0,0,W,H);
    }else if(srcX<0){
      const wS=-srcX,mS=srcW+srcX,r=wS/srcW,sX=r*W;
      ctx.drawImage(_mapImg,MAP_W-wS,srcY,wS,srcH,0,0,sX,H);
      ctx.drawImage(_mapImg,0,srcY,mS,srcH,sX,0,W-sX,H);
    }else{
      const mS=MAP_W-srcX,wS=srcW-mS,r=mS/srcW,sX=r*W;
      ctx.drawImage(_mapImg,srcX,srcY,mS,srcH,0,0,sX,H);
      ctx.drawImage(_mapImg,0,srcY,wS,srcH,sX,0,W-sX,H);
    }
  }
  // Coordinate transform (uses adjusted coordinate system)
  const toXY=(c)=>[W/2+((c[1]-cLng)/fLng)*W,H/2-((c[0]-cLat)/fLat)*H];
  // Grid
  ctx.strokeStyle="rgba(50,70,120,.12)";ctx.lineWidth=0.5*dpr;
  const gLat=fLat>80?30:fLat>40?15:fLat>20?10:5;
  const gLng=fLng>120?30:fLng>60?15:fLng>30?10:5;
  for(let lat=Math.floor((cLat-fLat)/gLat)*gLat;lat<=cLat+fLat;lat+=gLat){const[,y]=toXY([lat,0]);if(y>0&&y<H){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}}
  for(let lng=Math.floor((cLng-fLng)/gLng)*gLng;lng<=cLng+fLng;lng+=gLng){const[x]=toXY([0,lng]);if(x>0&&x<W){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}}
  // Route line (use adjusted coords)
  const oAdj=[oLat,oLng],dAdj=[dLat,dLng];
  const[ox,oy]=toXY(oAdj),[dx,dy]=toXY(dAdj);
  ctx.setLineDash([8*dpr,5*dpr]);ctx.strokeStyle="rgba(232,197,90,.5)";ctx.lineWidth=1.5*dpr;
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(dx,dy);ctx.stroke();ctx.setLineDash([]);
  // Origin dot
  ctx.beginPath();ctx.arc(ox,oy,4*dpr,0,Math.PI*2);ctx.fillStyle="rgba(160,170,190,.85)";ctx.fill();ctx.strokeStyle="rgba(255,255,255,.7)";ctx.lineWidth=1*dpr;ctx.stroke();
  // Destination dot
  ctx.beginPath();ctx.arc(dx,dy,5.5*dpr,0,Math.PI*2);ctx.fillStyle="#e8c55a";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1.5*dpr;ctx.stroke();
  // Labels
  const fs=Math.round(11*dpr);
  ctx.font=`bold ${fs}px 'DM Mono',monospace`;ctx.textAlign="center";
  ctx.fillStyle="rgba(11,17,32,.85)";ctx.fillText(CITY2CODES[oc]||"",ox+dpr,oy-10*dpr+dpr);ctx.fillText(CITY2CODES[dc]||"",dx+dpr,dy-12*dpr+dpr);
  ctx.fillStyle="#9ca3af";ctx.fillText(CITY2CODES[oc]||"",ox,oy-10*dpr);
  ctx.fillStyle="#e8c55a";ctx.fillText(CITY2CODES[dc]||"",dx,dy-12*dpr);
}

