function transformApiFlight(f){
  const alCode=f.airline_iata||"";
  const alName=AIRLINE_NAMES[alCode]||alCode;
  const fn=f.flight_iata?(alCode+" "+f.flight_number):("XX "+Math.floor(Math.random()*2999));
  const oc=f.dep_iata||"";
  const dc=f.arr_iata||"";
  const on=CODE2CITY[oc]||oc;
  const dn=CODE2CITY[dc]||dc;
  // Estimate duration from distance if not provided
  const ocC=COORDS[on],dcC=COORDS[dn];
  let dur=f.duration||0;
  if(!dur&&ocC&&dcC){dur=Math.round(haversine(ocC,dcC)/800*60)}
  // Generate dep/arr times: use API data if available, else synthesize
  let depTime,arrTime;
  if(f.dep_time&&f.dep_time.length>=16){
    depTime=f.dep_time.slice(11,16);
  }else{
    // Generate a seeded departure hour
    const r=seededRandom(dateSeed(td)+(oc+dc).split("").reduce((a,c)=>a+c.charCodeAt(0),0)+1);
    const dh=Math.floor(r()*18)+5;const dm=Math.floor(r()*12)*5;
    depTime=(dh%24).toString().padStart(2,"0")+":"+dm.toString().padStart(2,"0");
  }
  if(f.arr_time&&f.arr_time.length>=16){
    arrTime=f.arr_time.slice(11,16);
  }else{
    // Calculate arrival from departure + duration + tz offset
    const dM=parseInt(depTime.split(":")[0])*60+parseInt(depTime.split(":")[1]);
    let tzOff=0;
    if(ocC&&dcC)tzOff=Math.round((dcC[1]-ocC[1])/15);
    const aM=((dM+dur+tzOff*60)%1440+1440)%1440;
    arrTime=Math.floor(aM/60).toString().padStart(2,"0")+":"+(aM%60).toString().padStart(2,"0");
  }
  // Timezone change
  let tz="0";
  if(ocC&&dcC){
    const tzOff=Math.round((dcC[1]-ocC[1])/15);
    tz=tzOff>0?"+"+tzOff+"h":tzOff<0?tzOff+"h":"0";
  }
  const gate=f.dep_gate||f.dep_terminal||"--";
  const acIcao=f.aircraft_icao||"";
  let ac=AIRCRAFT_NAMES[acIcao]||acIcao||"";
  if(!ac){
    if(dur<=120)ac="Airbus A320";
    else if(dur<=300)ac="Boeing 737-800";
    else if(dur<=540)ac="Boeing 767-300";
    else ac="Boeing 787-9";
  }
  const r=seededRandom(dateSeed(td)+(oc+dc).split("").reduce((a,c)=>a+c.charCodeAt(0),0));
  const row=Math.floor(r()*30)+5;const letter="ABCDEF"[Math.floor(r()*6)];
  const seat=row+letter;
  return{al:alName,fn:fn,oc:oc,on:on,dc:dc,dn:dn,g:gate,dep:depTime,arr:arrTime,tz:tz,s:seat,ac:ac};
}

function classifyByCode(iata){
  const city=CODE2CITY[iata]||"";
  if(DIFF_SETS.easy.indexOf(city)>=0)return"easy";
  if(DIFF_SETS.medium.indexOf(city)>=0)return"medium";
  return"hard";
}

function fallbackFlights(){
  const r2=seededRandom(dateSeed(td)+99);
  return TIERS.map(t=>{const pool=byTier[t];return pool.length?pool[Math.floor(r2()*pool.length)]:pool[0]||byTier.easy[0]});
}

